<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>خوارزمی ۴۰۴ – برنامه‌ریز هوشمند درسی ۱۴۰۵</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;700;900&display=swap" rel="stylesheet">
  
  <!-- Chart.js فقط برای نمودارها -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    :root {
      --primary: #7c3aed;
      --primary-dark: #5b21b6;
      --accent: #ec4899;
      --glass-bg: rgba(255, 255, 255, 0.15);
      --glass-border: rgba(255, 255, 255, 0.2);
    }
    body {
      font-family: 'Vazirmatn', system-ui, sans-serif;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4338ca 100%);
      background-attachment: fixed;
      color: #f3e8ff;
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI1IiBoZWlnaHQ9IjUiPjxjaXJjbGUgY3g9IjIuNSIgY3k9IjIuNSIgcj0iMC4zIiBmaWxsPSJyZ2JhKDI1NSwyNTUsMjU1LDAuMSkiLz48L3N2Zz4=');
      opacity: 0.1;
      pointer-events: none;
    }
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(18px) saturate(190%);
      border: 1px solid var(--glass-border);
      box-shadow: 0 10px 36px rgba(0, 0, 0, 0.4);
      border-radius: 1.75rem;
    }
    .glass-sheen::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.18) 0%, transparent 60%, rgba(255,255,255,0.1) 100%);
      animation: sheenSoft 10s linear infinite;
      border-radius: inherit;
      pointer-events: none;
      z-index: 1;
    }
    @keyframes sheenSoft {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .neu-input {
      background: linear-gradient(145deg, rgba(255,255,255,0.1), rgba(0,0,0,0.2));
      box-shadow: inset 3px 3px 6px rgba(0,0,0,0.3), inset -3px -3px 6px rgba(255,255,255,0.05);
      border: none;
    }
    .card-hover {
      transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .card-hover:hover {
      transform: translateY(-10px) rotate(1deg) scale(1.04);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.45);
    }
    .fade-in-up { animation: fadeInUp 0.9s ease-out forwards; }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .pulse-glow {
      animation: pulseGlow 4s infinite ease-in-out;
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 25px rgba(124, 58, 237, 0.4); }
      50% { box-shadow: 0 0 50px rgba(124, 58, 237, 0.7); }
    }
    .subject-row {
      display: grid;
      grid-template-columns: 3fr 1.2fr 1.2fr 120px;
      gap: 1.5rem;
      align-items: center;
    }
    @media (max-width: 640px) {
      .subject-row { grid-template-columns: 1fr 1fr; gap: 1rem; }
      .subject-row > *:nth-child(n+3) { grid-column: span 2; }
    }
    .schedule-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0 0.75rem;
    }
    .schedule-table th, .schedule-table td {
      padding: 1.25rem;
      text-align: center;
      background: rgba(255,255,255,0.05);
      border-radius: 0.75rem;
    }
    .schedule-table th {
      background: rgba(124,58,237,0.2);
      font-weight: bold;
    }
    canvas {
      max-height: 340px;
      background: rgba(30,27,75,0.25);
      border-radius: 1.25rem;
      padding: 1.25rem;
    }
  </style>
</head>
<body class="py-14 px-4 sm:px-6 lg:px-8">
  <div class="max-w-6xl mx-auto space-y-14">

    <header class="text-center fade-in-up" style="animation-delay: 0.1s;">
      <h1 class="text-7xl md:text-8xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-purple-300 via-fuchsia-300 to-pink-300 drop-shadow-2xl pulse-glow inline-block">
        خوارزمی ۴۰۴
      </h1>
      <p class="mt-6 text-3xl md:text-4xl font-medium opacity-90">هوشمند • شخصی‌سازی‌شده • تحلیل پیشرفته – ۱۴۰۵</p>
    </header>

    <div class="glass glass-sheen p-10 md:p-14 fade-in-up" style="animation-delay: 0.3s;">
      <form id="studyForm" class="space-y-12">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
          <div>
            <label class="block text-2xl font-bold mb-4">پایه تحصیلی</label>
            <select id="grade" class="neu-input w-full p-6 rounded-3xl text-white text-xl focus:outline-none focus:ring-4 focus:ring-purple-500/60 transition">
              <option value="نهم">نهم – انتخاب رشته</option>
              <option value="دهم">دهم</option>
              <option value="یازدهم">یازدهم</option>
              <option value="دوازدهم">دوازدهم – کنکور</option>
            </select>
          </div>
          <div>
            <label class="block text-2xl font-bold mb-4">ساعات مطالعه روزانه</label>
            <input type="number" id="dailyHours" min="2" max="14" value="5.5" step="0.5" class="neu-input w-full p-6 rounded-3xl text-white text-xl text-center focus:outline-none focus:ring-4 focus:ring-purple-500/60 transition"/>
          </div>
        </div>

        <div>
          <div class="flex justify-between items-center mb-6">
            <label class="block text-2xl font-bold">دروس و درصد تسلط</label>
            <button type="button" id="addSubjectBtn" class="bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 text-white px-8 py-4 rounded-3xl font-bold shadow-xl transition transform hover:scale-110 flex items-center gap-3">
              <i class="fas fa-plus"></i> درس جدید
            </button>
          </div>
          <div id="subjectsContainer" class="space-y-6"></div>
        </div>

        <button type="submit" class="w-full bg-gradient-to-r from-violet-600 via-purple-600 to-fuchsia-600 hover:from-violet-700 hover:via-purple-700 hover:to-fuchsia-700 text-white text-3xl font-black py-7 rounded-4xl shadow-2xl transition transform hover:scale-105 pulse-glow">
          برنامه هوشمند رو بساز!
        </button>
      </form>
    </div>

    <div id="result" class="hidden fade-in-up" style="animation-delay: 0.5s;">
      <h2 class="text-6xl font-black text-center bg-clip-text text-transparent bg-gradient-to-r from-cyan-300 to-purple-400 mb-12">برنامه هفتگی پیشنهادی</h2>

      <div class="glass glass-sheen overflow-x-auto mb-12 rounded-2xl">
        <table id="scheduleTable" class="schedule-table"></table>
      </div>

      <div class="glass glass-sheen p-12 mt-12">
        <h3 class="text-5xl font-bold text-center mb-10">گزارش امروز و تحلیل</h3>
        <div id="reportSection" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-6 mb-10"></div>
        <button id="saveReportBtn" class="w-full bg-gradient-to-r from-amber-500 via-orange-500 to-rose-500 hover:from-amber-600 hover:via-orange-600 hover:to-rose-600 text-white py-6 rounded-4xl font-bold text-2xl shadow-2xl transition transform hover:scale-105">
          ثبت گزارش و بروزرسانی نمودارها
        </button>

        <!-- نمودارها اضافه شدند – بدون تغییر تم کلی -->
        <div class="mt-12 grid grid-cols-1 lg:grid-cols-2 gap-10">
          <div class="glass p-6">
            <h4 class="text-2xl font-bold text-center mb-6">میزان ضعف فعلی دروس</h4>
            <canvas id="weaknessChart"></canvas>
          </div>
          <div class="glass p-6">
            <h4 class="text-2xl font-bold text-center mb-6">روند پیشرفت کلی (چند روز اخیر)</h4>
            <canvas id="progressTrendChart"></canvas>
          </div>
        </div>

        <p id="reportFeedback" class="mt-10 text-center text-4xl font-bold"></p>
      </div>
    </div>
  </div>

  <script>
    const storageKey = 'kharazmiData';
    let data = {};
    try {
      const saved = localStorage.getItem(storageKey);
      if (saved) data = JSON.parse(saved);
    } catch (e) {
      data = { subjects: [], schedule: [], reports: [], progressHistory: [] };
    }

    function saveData() {
      try { localStorage.setItem(storageKey, JSON.stringify(data)); } catch (e) {}
    }

    const subjectsContainer = document.getElementById('subjectsContainer');

    function addSubject(name = '', mastery = 60) {
      const div = document.createElement('div');
      div.className = 'subject-row glass p-6 rounded-2xl';
      div.innerHTML = `
        <input type="text" placeholder="نام درس" value="${name}" class="neu-input p-5 rounded-2xl text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-purple-400 text-lg" required/>
        <input type="number" placeholder="% تسلط" min="0" max="100" value="${mastery}" class="neu-input p-5 rounded-2xl text-white text-center focus:outline-none focus:ring-2 focus:ring-purple-400 text-lg" required/>
        <button type="button" class="removeSubject bg-rose-500/70 hover:bg-rose-600 text-white px-6 py-4 rounded-2xl transition">
          <i class="fas fa-trash"></i>
        </button>
      `;
      subjectsContainer.appendChild(div);
      div.querySelector('.removeSubject').onclick = () => div.remove();
    }

    if (data.subjects?.length) {
      data.subjects.forEach(s => addSubject(s.name, s.mastery));
    } else {
      ['ریاضی', 'فیزیک', 'شیمی', 'زیست', 'ادبیات', 'عربی'].forEach(name => addSubject(name));
    }

    document.getElementById('addSubjectBtn').onclick = () => addSubject();

    let weaknessChart, progressTrendChart;

    function renderCharts() {
      const subjects = data.subjects || [];
      const reports = data.reports || [];

      // نمودار ضعف
      const weaknessCtx = document.getElementById('weaknessChart')?.getContext('2d');
      if (weaknessCtx) {
        weaknessChart?.destroy();
        weaknessChart = new Chart(weaknessCtx, {
          type: 'bar',
          data: {
            labels: subjects.map(s => s.name),
            datasets: [{
              label: 'ضعف',
              data: subjects.map(s => 100 - (s.mastery || 50)),
              backgroundColor: 'rgba(236, 72, 153, 0.7)',
              borderColor: '#ec4899',
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            scales: { y: { beginAtZero: true, max: 100 } },
            plugins: { legend: { display: false } }
          }
        });
      }

      // نمودار روند پیشرفت
      const progressCtx = document.getElementById('progressTrendChart')?.getContext('2d');
      if (progressCtx) {
        progressTrendChart?.destroy();
        progressTrendChart = new Chart(progressCtx, {
          type: 'line',
          data: {
            labels: reports.length ? reports.map((_,i) => `روز ${i+1}`) : ['بدون گزارش'],
            datasets: [{
              label: 'پیشرفت روزانه',
              data: reports.length ? reports : [0],
              borderColor: '#c084fc',
              backgroundColor: 'rgba(192, 132, 252, 0.2)',
              tension: 0.4,
              fill: true
            }]
          },
          options: {
            responsive: true,
            scales: { y: { beginAtZero: true, max: 100 } }
          }
        });
      }
    }

    document.getElementById('studyForm').onsubmit = function(e) {
      e.preventDefault();
      const dailyHours = parseFloat(document.getElementById('dailyHours').value) || 5;
      const totalMin = dailyHours * 60;
      const subjects = [];
      subjectsContainer.querySelectorAll('.subject-row').forEach(row => {
        const inputs = row.querySelectorAll('input');
        const name = inputs[0].value.trim();
        const mastery = parseInt(inputs[1].value) || 50;
        if (name) subjects.push({name, mastery});
      });
      if (subjects.length === 0) return alert('حداقل یک درس وارد کن داداش!');
      const totalWeakness = subjects.reduce((sum, s) => sum + (100 - s.mastery), 0) || subjects.length * 50;
      const scheduleItems = subjects.map(s => {
        const weight = (100 - s.mastery) / totalWeakness;
        const minutes = Math.round(totalMin * weight);
        const hours = Math.floor(minutes / 60);
        const mins = minutes % 60;
        return {name: s.name, dailyMinutes: minutes, time: `${hours ? hours + ' ساعت ' : ''}${mins ? mins + ' دقیقه' : ''}`.trim(), progress: 0};
      });
      data.subjects = subjects;
      data.schedule = scheduleItems;
      data.reports = data.reports || [];
      saveData();
      renderScheduleTable(scheduleItems);
      renderReportSection(subjects);
      renderCharts();
      document.getElementById('result').classList.remove('hidden');
      window.scrollTo({ top: document.getElementById('result').offsetTop - 100, behavior: 'smooth' });
    };

    function renderScheduleTable(schedule) {
      const table = document.getElementById('scheduleTable');
      table.innerHTML = '';
      const days = ['شنبه', 'یکشنبه', 'دوشنبه', 'سه‌شنبه', 'چهارشنبه', 'پنجشنبه', 'جمعه'];
      let html = '<thead><tr><th>درس</th>';
      days.forEach(day => html += `<th>${day}</th>`);
      html += '</tr></thead><tbody>';
      schedule.forEach(item => {
        html += '<tr><td class="font-bold text-purple-200">' + item.name + '</td>';
        days.forEach(() => html += `<td>${item.time}</td>`);
        html += '</tr>';
      });
      html += '</tbody>';
      table.innerHTML = html;
    }

    function renderReportSection(subjects) {
      const section = document.getElementById('reportSection');
      section.innerHTML = '';
      subjects.forEach(s => {
        const label = document.createElement('label');
        label.className = 'glass p-6 rounded-2xl flex items-center justify-center gap-4 cursor-pointer hover:bg-white/10 transition text-xl font-medium';
        label.innerHTML = `
          <input type="checkbox" class="report-checkbox w-7 h-7 text-purple-500 rounded focus:ring-purple-400"/>
          <span>${s.name}</span>
        `;
        section.appendChild(label);
      });
    }

    document.getElementById('saveReportBtn').onclick = function() {
      const checked = document.querySelectorAll('.report-checkbox:checked').length;
      const total = document.querySelectorAll('.report-checkbox').length;
      if (total === 0) return;
      const percent = Math.round((checked / total) * 100);
      let msg = percent >= 85 ? 'عالی بودی ستاره! 🌟 ادامه بده' :
                percent >= 60 ? 'خوب بود، فردا قوی‌تر باش 💪' :
                'امروز کم بود... فردا جبران کن 🔥';
      const todayProgress = percent;
      data.reports.push(todayProgress);
      if (data.reports.length > 7) data.reports.shift();
      const avgProgress = data.reports.reduce((sum, p) => sum + p, 0) / data.reports.length;
      let analysis = '';
      if (todayProgress < 70) {
        analysis = '<br>عقب افتادی! برنامه رو تنظیم کردم.';
        adjustSchedule();
      }
      if (avgProgress < 60) {
        analysis += '<br>هشدار افت تحصیلی: میانگین ' + Math.round(avgProgress) + '% – استرس داری؟ استراحت کن.';
      } else if (avgProgress > 85) {
        analysis += '<br>عالی پیش می‌ری! میانگین ' + Math.round(avgProgress) + '% – ادامه بده قهرمان!';
      }
      document.getElementById('reportFeedback').innerHTML = `
        <span class="text-6xl block mb-4">${percent}%</span>
        ${msg}${analysis}
      `;
      saveData();
      renderScheduleTable(data.schedule);
      renderCharts();
    };

    function adjustSchedule() {
      data.schedule.forEach((s, i) => {
        if (document.querySelectorAll('.report-checkbox')[i]?.checked === false) {
          s.dailyMinutes += 30;
        }
        const mins = s.dailyMinutes;
        const h = Math.floor(mins / 60);
        const m = mins % 60;
        s.time = `${h ? h + ' ساعت ' : ''}${m ? m + ' دقیقه' : ''}`.trim();
      });
    }

    function saveData() {
      try { localStorage.setItem(storageKey, JSON.stringify(data)); } catch (e) {}
    }

    if (data.schedule?.length) {
      renderScheduleTable(data.schedule);
      renderReportSection(data.subjects);
      renderCharts();
      document.getElementById('result').classList.remove('hidden');
    }
  </script>
</body>
</html>
